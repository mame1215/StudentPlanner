<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Task Manager</h1>

    <h2>今日のタスク</h2>

    <ul id="taskList"></ul>

    <div class="input-area">
        <input
            class="text-input"
            type="text"
            id="taskInput"
            placeholder="タスク名を入力">

        <input class="text-input" type="datetime-local" id="dueInput">

        <button id="addTaskButton">
            + タスク追加
        </button>
    </div>

    <div id="modal" class="hidden">
        <div id="modalContent">

            <h2>タスクを編集</h2>

            <label>タイトル</label>
            <input type="text" id="editTitle">

            <label>期限</label>
            <input type="datetime-local" id="editDue">

            <div class="modal-buttons">
                <button id="cancelButton" class="secondary-button">
                    キャンセル
                </button>
                <button id="saveButton" class="primary-button">
                    保存
                </button>
            </div>
            
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
