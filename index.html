<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <h1>Task Manager</h1>

    <h2>今日のタスク</h2>

    <ul id="taskList"></ul>

    <div class="input-area">
        <input
            class="text-input"
            type="text"
            id="taskInput"
            placeholder="タスク名を入力">

        <div class="input-area-row">
            <input class="text-input" type="datetime-local" id="dueInput">

            <select id="priorityInput">
                <option value="5">🔴 最優先</option>
                <option value="4">🟠 高</option>
                <option value="3" selected>🟡 中</option>
                <option value="2">🟢 低</option>
                <option value="1">⚪ 最低</option>
            </select>

            <select id="subjectInput">
                <option value="">教科なし</option>
            </select>
        </div>

        <div class="tag-group">
            <span>タグ</span>

            <div id="tagInput"></div>
        </div>

        <textarea
            id="memoInput"
            placeholder="メモ（任意）"
            rows="3"></textarea>

        <button id="addTaskButton">
            + タスク追加
        </button>
    </div>

    <div id="modal" class="hidden">
        <div id="modalContent">

            <h2>タスクを編集</h2>

            <label>タイトル</label>
            <input type="text" id="editTitle">

            <label>期限</label>
            <input type="datetime-local" id="editDue">

            <label>優先度</label>
                <select id="editPriority">
                    <option value="5">🔴 最優先</option>
                    <option value="4">🟠 高</option>
                    <option value="3" selected>🟡 中</option>
                    <option value="2">🟢 低</option>
                    <option value="1">⚪ 最低</option>
                </select>
            
            <label>教科</label>
            <select id="editSubject"></select>

            <div class="modal-buttons">
                <button id="cancelButton" class="secondary-button">
                    キャンセル
                </button>
                <button id="saveButton" class="primary-button">
                    保存
                </button>
            </div>
            
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
